<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stackly | 404 Page Not Found</title>
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><path fill='%236366F1' d='M135.2 117.4L109.1 192H402.9l-26.1-74.6C372.3 104.6 360.2 96 346.6 96H165.4c-13.6 0-25.7 8.6-30.2 21.4zM39.6 196.8L74.8 96.3C88.3 57.8 124.6 32 165.4 32H346.6c40.8 0 77.1 25.8 90.6 64.3l35.2 100.5c23.2 9.6 39.6 32.5 39.6 59.2V400v48c0 17.7-14.3 32-32 32H448c-17.7 0-32-14.3-32-32V400H96v48c0 17.7-14.3 32-32 32H32c-17.7 0-32-14.3-32-32V400 256c0-26.7 16.4-49.6 39.6-59.2zM128 288a32 32 0 1 0 -64 0 32 32 0 1 0 64 0zm288 32a32 32 0 1 0 0-64 32 32 0 1 0 0 64z'/></svg>">
    <link rel="stylesheet" href="../css/error.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <script>
        if (localStorage.getItem('stackly-theme') === 'light') {
            document.body.classList.add('light-theme');
        }
    </script>

    <div id="page-loader">
        <div class="loader-content">
            <img src="../assets/Home1/Header/logo.webp" alt="Stackly Logo" class="loader-img">
            <p>Rerouting...</p>
        </div>
    </div>

    <main class="error-section fade-in">
        <div class="ambient-glow"></div>
        
        <div class="container error-container center-aligned">
            <div class="error-content">
                <h1 class="error-code">404</h1>
                <h2>Lost in the Code?</h2>
                <p>The page you are looking for might have been removed, had its name changed, or is temporarily unavailable. Let's get you back on track to your next career move.</p>
                
                <a href="../index.html" class="btn btn-glow return-btn">
                    <i class="fa-solid fa-house"></i> Return to home
                </a>
            </div>
        </div>
    </main>

    <script>
        // Loader Logic
        window.addEventListener('load', () => {
            const loader = document.getElementById('page-loader');
            loader.style.opacity = '0';
            setTimeout(() => { loader.style.display = 'none'; }, 300);
        });

        window.addEventListener('pageshow', (event) => {
            if (event.persisted) {
                const loader = document.getElementById('page-loader');
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => { loader.style.display = 'none'; }, 300);
                }
            }
        });

        // Smooth exit transition for the return button
        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', function (e) {
                const href = this.getAttribute('href');
                if (href && href !== '#' && !href.startsWith('javascript')) {
                    e.preventDefault();
                    const loader = document.getElementById('page-loader');
                    loader.style.display = 'flex';
                    setTimeout(() => { loader.style.opacity = '1'; }, 10);
                    setTimeout(() => { window.location.href = href; }, 400);
                }
            });
        });
    </script>
</body>

</html>
